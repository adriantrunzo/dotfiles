# ~/.config/starship.toml

# Wait a bit longer than the default 500ms for commands to execute. Node and git
# timeout rather frequently.
command_timeout = 5000

[aws]
disabled = true

[character]
success_symbol = "[i❯](bold green) "
error_symbol = "[i❯](bold red) "
vicmd_symbol = "[n❯](bold purple) "
vimcmd_visual_symbol = "[v❯](bold yellow)"
vimcmd_replace_symbol = "[R❯](bold orange)"
vimcmd_replace_one_symbol = "[r❯](bold orange)"

[docker_context]
disabled = true
